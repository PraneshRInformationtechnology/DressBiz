<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563EB" />
    <title>Offline - Dress Manager</title>
    <style>
      body { margin: 0; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
      .card { padding: 2rem; max-width: 420px; width: 100%; background: white; border-radius: 24px; box-shadow: 0 20px 50px rgba(15,23,42,0.12); }
      h1 { margin: 0 0 1rem; font-size: 1.75rem; }
      p { margin: 0 0 1.5rem; line-height: 1.6; color: #475569; }
      a { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.85rem 1.25rem; background: #2563EB; color: white; border-radius: 9999px; text-decoration: none; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Offline Mode</h1>
      <p>Dress Manager is unavailable because your device is offline. Previously visited pages are cached and may still load when you navigate.</p>
      <a href="/">Return to Home</a>
    </div>
  </body>
</html>
